# GitHub Actions workflow for CI pipeline for the Campus Eats
# Android application. This workflow ONLY validates source code and
# runs unit tests. No APK, AAB, or artifacts are generated.

name: CI - Code Validation and Unit Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run lint to check for errors and warnings
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew test

      - name: Generate test coverage report
        run: ./gradlew testDebugCoverage

      - name: Check for lint issues
        if: failure()
        run: |
          echo "Lint issues found. Please fix all errors and warnings."
          exit 1

      - name: Check for test failures
        if: failure()
        run: |
          echo "Unit tests failed. Please fix failing tests."
          exit 1
